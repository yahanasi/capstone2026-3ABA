spring:
  profiles:
    active: local # 기본값
  # [공통 설정] 모든 프로필에서 공통으로 사용하는 정보
  datasource:
    username: root
    password: "1234"
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# 1. 로컬 실행용 (IntelliJ)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:mariadb://localhost:3316/user_db

---
# 2. 도커 배포용
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mariadb://db:3306/user_db